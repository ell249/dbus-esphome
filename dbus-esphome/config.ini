# dbus-esphome configuration
#
# Add one [device_N] section for each ESPHome device.
# Sections must start with "device" (case-insensitive).
# encryption_key is the base64 key from the api: block of your ESPHome YAML.
# Leave encryption_key empty if the device has no API encryption configured.

[device_1]
host = 192.168.1.100
encryption_key = ZW0RlpPGAy5OXkWyulqFNnGBkaA5jKEuOQFvafwlo3w=

# [device_2]
# host = 192.168.1.101
# encryption_key =


# Optional: override the maximum value used to calculate tank level percentages.
# Format:  <entity name>.max = <value>
# The entity name must match exactly what the ESPHome YAML uses for "name:".
# Unit-based defaults (used when no override exists):
#   A   → 50     mA  → 50000
#   V   → 30     mV  → 30000
#   W   → 5000   %   → 100   (others) → 100

[sensor_ranges]
# IS-U1.max = 40    # current sensor max 40 A (BTH50030 rated at ~30 A continuous)
# IS-U2.max = 40
# IS-U3.max = 40
# IS-U4.max = 40
# IS-U5.max = 40
# IS-U6.max = 40
# V1.max = 16       # automotive 12 V system: 9–16 V range
# V2.max = 16
# AIN1.max = 36     # analog inputs use 11x divider, raw 0–36 V
# AIN2.max = 36
# AIN3.max = 36
# AIN4.max = 36
